schema: moran_aux
source_dir: ../dist
script: |
  function eq(left, right)
    print('Left  = ' .. tostring(left))
    print('Right = ' .. tostring(right))
    return left == right
  end

deploy:
  default:
    tests:
      - send: 'lmjxz'
        assert: cand[1].text == '連接' and cand[1].comment == 'z'
      - send: 'iifjku'
        assert: cand[2].text == '喫飯'
      - send: 'iifjuk'
        assert: cand[2].text == '喫飯'
      - send: 'jivm'
        assert: cand[3].comment ~= 'vm'
      - send: 'hk'
        assert: cand[1].text == '好' and cand[1].comment == "⚡"

  aux_hint:
    patch:
      moran/enable_aux_hint: true
    tests:
      - send: 'keyima'
        assert: eq(cand[1].text, '可以嗎')

  quick_code_hint_without_fix_dict:
    patch:
      moran/enable_quick_code_hint: true
    tests:
      - send: 'yyteer'
        assert: cand[1].text == '英特爾' and eq(cand[1].comment, '')

  quick_code_hint_with_fix_dict:
    patch:
      moran/enable_quick_code_hint: true
      moran/fix/use_dict: true
      moran/fix/use_dict_max_length: 3
    tests:
      - send: 'yyteer'
        assert: cand[1].text == '英特爾' and eq(cand[1].comment, '⚡yte')

  quick_code_hint_respects_fix_dict_max_length:
    patch:
      moran/enable_quick_code_hint: true
      moran/fix/use_dict: true
      moran/fix/use_dict_max_length: 2
    tests:
      - send: 'yyteer'
        assert: cand[1].text == '英特爾' and eq(cand[1].comment, '')

  tab:
    tests:
      - send: 'lmjx{Tab}j{space}{space}'
        assert: commit == '鏈接'

  fix_no_dict_branches:
    tests:
      - send: 'lmjx'
        assert: cand[1].text == '鏈接' and cand[1].comment == "" and preedit == 'lm jx'
      - send: 'a'
        assert: cand[1].text == '啊' and cand[1].comment ~= "⚡"
      - send: 'hk'
        assert: cand[1].text == '好' and cand[1].comment == "⚡"
      - send: 'hk'
        assert: cand[1].text == '好' and cand[1].comment == "⚡"

  pin:
    tests:
      - send: 'lmjx'
        assert: cand[1].text == '鏈接' and cand[2].text == '連接'
      - send: 'lmjx{Control+t}'  # SIDE-EFFECT!!
        assert: cand[1].comment == "📌"
      - send: 'lmjx{Control+t}'
        assert: cand[1].comment == ""
      - send: 'lmjx{Down}{Control+t}'
        assert: cand[1].text == '連接' and cand[1].comment == "📌"
      - send: 'lmjx'
        assert: cand[1].text == '連接' and cand[1].comment == "📌"
      - send: 'xnli{Control+t}'
        assert: cand[1].text == '心裏' and cand[1].comment == "📌" and preedit == 'xn li'
      - send: 'hk{Down}{Control+t}'
        assert: cand[1].comment == "📌" and cand[2].text == '好' and cand[2].comment == "⚡"
      - send: 'hk{Control+t}'
        assert: cand[1].text == '好' and cand[1].comment == "⚡"

  pin_with_fix_dict:
    patch:
      moran/fix/use_dict: true
    tests:
      - send: 'xnli{Control+t}'
        assert: cand[1].text == '心裏' and cand[1].comment == "📌" and preedit == 'xn li'

  fix_dict_branches:
    patch:
      moran/fix/use_dict: true
    tests:
      - send: 'hk'
        assert: cand[1].text == '好' and cand[1].comment == "⚡"
      - send: 'xnli'
        assert: cand[1].text == '心裏' and cand[1].comment ~= "⚡" and preedit == 'xn li'

  fix_dict_word:
    patch:
      moran/fix/use_dict: true
      moran/fix/use_dict_max_length: 4
    tests:
      - send: 'xnli'
        assert: cand[1].text == '心裏' and cand[1].comment == "⚡" and preedit == 'xn li'

  pin_with_fix_dict_word:
    patch:
      moran/fix/use_dict: true
      moran/fix/use_dict_max_length: 4
    tests:
      - send: 'xnli{Control+t}'
        assert: cand[1].text == '心裏' and cand[1].comment == "📌" and preedit == 'xn li'

  pin_same_as_fix_dict:
    patch:
      moran/fix/use_dict: true
    tests:
      - send: 'hk{Control+t}'
        assert: cand[1].text == '好' and cand[1].comment == "📌"
      - send: 'hk'
        assert: cand[1].text == '好' and cand[1].comment == "📌" and (cand[2] == nil or cand[2].text ~= '好')

  custom_indicators:
    patch:
      moran/quick_code_indicator: "💥"
      moran/pin/indicator: "📍"
    tests:
      - send: 'hk'
        assert: cand[1].text == '好' and cand[1].comment == "💥"
      - send: 'xnli{Control+t}'
        assert: cand[1].text == '心裏' and cand[1].comment == "📍" and preedit == 'xn li'

